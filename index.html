<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Ad-Free Player</title>
    <style>
        /* Τα ίδια styles που είχες */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #1a1a1a; font-family: sans-serif; padding: 20px; }
        h1 { color: white; text-align: center; margin-bottom: 30px; }
        
        #video-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .video-card {
            background: #2d2d2d;
            border-radius: 10px;
            overflow: hidden;
        }
        
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 */
            height: 0;
            background: #000;
        }
        
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .video-title {
            color: white;
            padding: 12px;
            font-size: 14px;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <h1>🎬 YouTube Ad-Free Player</h1>
    <div id="video-container">Φόρτωση...</div>

    <script>
        // Εξαγωγή video ID από YouTube URL
        function getVideoId(url) {
            const patterns = [
                /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\n?#]+)/,
                /youtube\.com\/watch\?.+&v=([^&\n?#]+)/
            ];
            for (let pattern of patterns) {
                const match = url.match(pattern);
                if (match) return match[1];
            }
            return null;
        }

        // Φόρτωση των links από το αρχείο
        fetch('data/links.txt')
            .then(response => response.text())
            .then(text => {
                const container = document.getElementById('video-container');
                container.innerHTML = '';
                
                const links = text.split('\n')
                    .map(line => line.trim())
                    .filter(line => line && !line.startsWith('#'));
                
                links.forEach((link, index) => {
                    const videoId = getVideoId(link);
                    if (!videoId) return;
                    
                    const card = document.createElement('div');
                    card.className = 'video-card';
                    
                    // Δημιουργία wrapper για το video
                    const wrapper = document.createElement('div');
                    wrapper.className = 'video-wrapper';
                    
                    // ΧΡΗΣΙΜΟΠΟΙΟΥΜΕ ΜΟΝΟ youtube-nocookie.com
                    // Αυτό είναι το κλειδί - ΧΩΡΙΣ IFrame API!
                    const iframe = document.createElement('iframe');
                    iframe.src = `https://www.youtube-nocookie.com/embed/${videoId}?autoplay=0&rel=0&modestbranding=1&iv_load_policy=3`;
                    iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture";
                    iframe.allowFullscreen = true;
                    
                    wrapper.appendChild(iframe);
                    
                    const title = document.createElement('div');
                    title.className = 'video-title';
                    title.textContent = `Video ${index + 1}`;
                    
                    card.appendChild(wrapper);
                    card.appendChild(title);
                    container.appendChild(card);
                });
            })
            .catch(error => {
                document.getElementById('video-container').innerHTML = 
                    `<div style="color: red; text-align: center;">Σφάλμα: ${error.message}</div>`;
            });
    </script>
</body>
</html>
